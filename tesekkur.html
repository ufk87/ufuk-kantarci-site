<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teşekkürler — Ufuk Kantarcı</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f0eeeb; font-family: 'Barlow', sans-serif;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; text-align: center; padding: 2rem;
}
.box { max-width: 480px; }
.check { font-size: 3rem; margin-bottom: 1.5rem; }
h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 2.5rem; font-weight: 800; color: #1c1c1e; margin-bottom: 1rem; }
p { font-size: 1rem; color: #555; line-height: 1.8; margin-bottom: 2rem; }
a { display: inline-block; font-family: 'Barlow Condensed', sans-serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.1em; padding: 0.75rem 2rem; background: #1c1c1e; color: #fff; text-decoration: none; border-radius: 3px; }
a:hover { background: #333; }
</style>
</head>
<body>
<div class="box">
  <div class="check">✓</div>
  <h1>MESAJINIZ ALINDI!</h1>
  <p>Mesajınız için teşekkürler. En kısa sürede size geri döneceğim.</p>
  <a href="/">ANA SAYFAYA DÖN</a>
</div>
</body>
</html>
